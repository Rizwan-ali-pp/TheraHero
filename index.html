<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>TheraHero</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
</head>

<body>

    <script>
        class MenuScene extends Phaser.Scene {
            constructor() {
                super("MenuScene");
            }

            create() {
                this.add.text(250, 250, "THERAHERO", {
                    fontSize: "48px",
                    fill: "#000"
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            backgroundColor: "#f5f5f5",
            scene: [MenuScene]
        };

        new Phaser.Game(config);
    </script>

</body>

</html>
